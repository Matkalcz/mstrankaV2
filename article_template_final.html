<div class="article-detail-page">
  <div class="container">
    <article class="article-content">
      <div class="article-header">
        <nav class="breadcrumb">
          <a href="/">Domů</a> / 
          <a href="/blog">Blog</a> / 
          <span class="current">[Title]</span>
        </nav>
        
        <div class="article-meta">
          <span class="category">[CategoryName]</span>
          <span class="date">[PublishedDate]</span>
          <span class="read-time">≈ 5 min čtení</span>
        </div>
        
        <h1 class="article-title">[Title]</h1>
        <p class="article-perex">[Perex]</p>
        
        <div class="article-image">
          <img src="[TitleImageUrl]" alt="[Title]" onerror="this.style.display='none'">
        </div>
      </div>
      
      <div class="article-body">
        [Content]
      </div>
      
      <div class="article-footer">
        <div class="article-tags">
          <span class="tags-label">Štítky:</span>
          <span class="tag">OpenClaw</span>
          <span class="tag">AI</span>
          <span class="tag">Automatizace</span>
        </div>
        
        <div class="article-navigation">
          <a href="/blog" class="btn btn-outline">← Zpět na blog</a>
          <button class="btn btn-primary" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
            ↑ Nahoru
          </button>
        </div>
      </div>
    </article>
  </div>
</div>
