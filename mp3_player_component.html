<div class="podcast-player-section">
  <div class="container">
    <div class="podcast-player">
      <!-- Player header -->
      <div class="player-header">
        <div class="player-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a3 3 0 00-3 3v7a3 3 0 006 0V5a3 3 0 00-3-3z"></path>
            <path d="M19 10v2a7 7 0 01-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
        </div>
        <div class="player-info">
          <h3 class="player-title">[Title]</h3>
          <div class="player-meta">
            <span class="meta-item">
              <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
              </svg>
              [textField2]
            </span>
            <span class="meta-item">
              <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              [textField3]
            </span>
            <span class="meta-item">
              <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
              [PublishedDate]
            </span>
          </div>
        </div>
      </div>
      
      <!-- Audio player -->
      <div class="audio-player">
        <audio id="podcastAudio" controls preload="metadata">
          <source src="[textField1]" type="audio/mpeg">
          Váš prohlížeč nepodporuje přehrávání audio souborů.
        </audio>
        
        <div class="player-controls">
          <button class="control-btn" id="playPauseBtn" aria-label="Play/Pause">
            <svg class="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg class="pause-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
              <rect x="6" y="4" width="4" height="16"></rect>
              <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          </button>
          
          <div class="progress-container">
            <div class="progress-bar" id="progressBar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-display">
              <span id="currentTime">0:00</span>
              <span id="duration">0:00</span>
            </div>
          </div>
          
          <button class="control-btn" id="muteBtn" aria-label="Mute/Unmute">
            <svg class="volume-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"></path>
            </svg>
            <svg class="mute-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <line x1="23" y1="9" x2="17" y2="15"></line>
              <line x1="17" y1="9" x2="23" y2="15"></line>
            </svg>
          </button>
          
          <div class="volume-control">
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1" aria-label="Volume">
          </div>
          
          <button class="control-btn" id="downloadBtn" aria-label="Download">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
          </button>
        </div>
      </div>
      
      <!-- Player actions -->
      <div class="player-actions">
        <button class="action-btn" id="speedBtn" data-speed="1">
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          1×
        </button>
        
        <button class="action-btn" id="skipBackBtn">
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="19 20 9 12 19 4 19 20"></polygon>
            <line x1="5" y1="19" x2="5" y2="5"></line>
          </svg>
          -15s
        </button>
        
        <button class="action-btn" id="skipForwardBtn">
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 4 15 12 5 20 5 4"></polygon>
            <line x1="19" y1="5" x2="19" y2="19"></line>
          </svg>
          +15s
        </button>
        
        <button class="action-btn" id="shareBtn">
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
          </svg>
          Sdílet
        </button>
      </div>
      
      <!-- Transcript section (if available) -->
      <div class="transcript-section" id="transcriptSection" style="display: none;">
        <h4 class="transcript-title">
          <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          Přepis podcastu
        </h4>
        <div class="transcript-content" id="transcriptContent">
          [textField4]
        </div>
        <button class="transcript-toggle" id="transcriptToggle">
          <span>Zobrazit přepis</span>
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const audio = document.getElementById('podcastAudio');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const currentTimeEl = document.getElementById('currentTime');
  const durationEl = document.getElementById('duration');
  const muteBtn = document.getElementById('muteBtn');
  const volumeSlider = document.getElementById('volumeSlider');
  const speedBtn = document.getElementById('speedBtn');
  const skipBackBtn = document.getElementById('skipBackBtn');
  const skipForwardBtn = document.getElementById('skipForwardBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const shareBtn = document.getElementById('shareBtn');
  const transcriptToggle = document.getElementById('transcriptToggle');
  const transcriptSection = document.getElementById('transcriptSection');
  const transcriptContent = document.getElementById('transcriptContent');
  
  // Check if transcript exists
  if (transcriptContent.textContent.trim()) {
    transcriptSection.style.display = 'block';
  }
  
  // Format time (seconds to MM:SS)
  function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
  }
  
  // Update time display
  function updateTime() {
    currentTimeEl.textContent = formatTime(audio.currentTime);
    durationEl.textContent = formatTime(audio.duration || 0);
    
    // Update progress bar
    const progress = (audio.currentTime / audio.duration) * 100 || 0;
    progressFill.style.width = `${progress}%`;
  }
  
  // Play/Pause
  playPauseBtn.addEventListener('click', function() {
    if (audio.paused) {
      audio.play();
      playPauseBtn.querySelector('.play-icon').style.display = 'none';
      playPauseBtn.querySelector('.pause-icon').style.display = 'block';
    } else {
      audio.pause();
      playPauseBtn.querySelector('.play-icon').style.display = 'block';
      playPauseBtn.querySelector('.pause-icon').style.display = 'none';
    }
  });
  
  // Update play/pause icon based on audio state
  audio.addEventListener('play', function() {
    playPauseBtn.querySelector('.play-icon').style.display = 'none';
    playPauseBtn.querySelector('.pause-icon').style.display = 'block';
  });
  
  audio.addEventListener('pause', function() {
    playPauseBtn.querySelector('.play-icon').style.display = 'block';
    playPauseBtn.querySelector('.pause-icon').style.display = 'none';
  });
  
  // Progress bar click
  progressBar.addEventListener('click', function(e) {
    const rect = progressBar.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    audio.currentTime = percent * audio.duration;
  });
  
  // Update time continuously
  audio.addEventListener('timeupdate', updateTime);
  
  // Set duration when loaded
  audio.addEventListener('loadedmetadata', updateTime);
  
  // Mute/Unmute
  muteBtn.addEventListener('click', function() {
    audio.muted = !audio.muted;
    muteBtn.querySelector('.volume-icon').style.display = audio.muted ? 'none' : 'block';
    muteBtn.querySelector('.mute-icon').style.display = audio.muted ? 'block' : 'none';
  });
  
  // Volume control
  volumeSlider.addEventListener('input', function() {
    audio.volume = this.value;
    audio.muted = this.value == 0;
    muteBtn.querySelector('.volume-icon').style.display = this.value == 0 ? 'none' : 'block';
    muteBtn.querySelector('.mute-icon').style.display = this.value == 0 ? 'block' : 'none';
  });
  
  // Playback speed
  const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
  let speedIndex = 2; // Start at 1x
  
  speedBtn.addEventListener('click', function() {
    speedIndex = (speedIndex + 1) % speeds.length;
    const speed = speeds[speedIndex];
    audio.playbackRate = speed;
    speedBtn.textContent = `${speed}×`;
    speedBtn.setAttribute('data-speed', speed);
  });
  
  // Skip buttons
  skipBackBtn.addEventListener('click', function() {
    audio.currentTime = Math.max(0, audio.currentTime - 15);
  });
  
  skipForwardBtn.addEventListener('click', function() {
    audio.currentTime = Math.min(audio.duration, audio.currentTime + 15);
  });
  
  // Download
  downloadBtn.addEventListener('click', function() {
    const audioSrc = audio.querySelector('source').src;
    const link = document.createElement('a');
    link.href = audioSrc;
    link.download = 'podcast.mp3';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });
  
  // Share
  shareBtn.addEventListener('click', function() {
    if (navigator.share) {
      navigator.share({
        title: document.title,
        text: 'Poslechněte si tento podcast',
        url: window.location.href
      });
    } else {
      // Fallback: copy to clipboard
      navigator.clipboard.writeText(window.location.href).then(function() {
        alert('Odkaz zkopírován do schránky!');
      });
    }
  });
  
  // Transcript toggle
  let transcriptVisible = false;
  transcriptToggle.addEventListener('click', function() {
    transcriptVisible = !transcriptVisible;
    transcriptContent.style.display = transcriptVisible ? 'block' : 'none';
    transcriptToggle.querySelector('span').textContent = 
      transcriptVisible ? 'Skrýt přepis' : 'Zobrazit přepis';
    
    // Rotate arrow
    const arrow = transcriptToggle.querySelector('.icon');
    arrow.style.transform = transcriptVisible ? 'rotate(180deg)' : 'rotate(0)';
  });
  
  // Initialize
  updateTime();
});
</script>
