<section id="novinky" class="blog-section">
  <div class="container">
    <h2 class="section-title">📰 Nejnovější články</h2>
    <p class="section-subtitle">Sledujte novinky z ekosystému OpenClaw</p>
    
    <div class="blog-grid">
      <posts category="novinky,vyvoj,navody" take="3" order="date">
        <article class="blog-card">
          <div class="card-header">
            <span class="category">[CategoryName]</span>
            <span class="date">[PublishedDate:dd.MM.yyyy]</span>
          </div>
          <h3 class="card-title">[Title]</h3>
          <p class="card-excerpt">[Perex]</p>
          <a href="[Url]" class="card-link">Číst více →</a>
        </article>
      </posts>
    </div>
    
    <div class="section-actions">
      <a href="#vsechny-clanky" class="btn btn-primary">Všechny články</a>
    </div>
  </div>
</section>
