# Nginx konfigurace pro Kviz New
# Umístit do: /etc/nginx/sites-available/kviz-new
# a vytvořit symlink: ln -s /etc/nginx/sites-available/kviz-new /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    
    server_name kviz.michaljanda.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name kviz.michaljanda.com;
    
    # SSL certifikáty (předpokládáme Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/kviz.michaljanda.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kviz.michaljanda.com/privkey.pem;
    
    # SSL optimalizace
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Root adresář
    root /var/www/kviz-new;
    
    # Hlavní lokace
    location / {
        # Proxy na Next.js server (běží na portu 3000)
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouty
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Statické soubory
    location /_next/static {
        alias /var/www/kviz-new/.next/static;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
    
    # Redirect /next/* to /_next/* (fallback for incorrect paths)
    location ~ ^/next/(.*)$ {
        return 301 /_next/$1;
    }
    
    location /public {
        alias /var/www/kviz-new/public;
        expires 30d;
        add_header Cache-Control "public";
    }
    
    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Zabránit přístupu k .git a config souborům
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~* \.(log|sql|conf|env|sh)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Gzip komprese
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    
    # Logování
    access_log /var/log/nginx/kviz-new.access.log;
    error_log /var/log/nginx/kviz-new.error.log;
    
    # HSTS header
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';" always;
}