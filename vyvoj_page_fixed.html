<div class="blog-page">
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">Vývoj OpenClaw</h1>
      <p class="page-subtitle">Technické články o vývoji a architektuře OpenClaw</p>
    </div>
    
    <div class="posts-grid">
      <posts category="vyvoj" take="12" order="date" paging="true" pagesize="12">
        <article class="post-card">
          <div class="post-header">
            <span class="post-category">Vývoj</span>
            <span class="post-date">[PublishedDate]</span>
          </div>
          <h2 class="post-title">[Title]</h2>
          <p class="post-excerpt">[Perex]</p>
          <div class="post-footer">
            <a href="[Url]" class="post-link">Číst celý článek →</a>
            <span class="read-time">≈ 5 min čtení</span>
          </div>
        </article>
      </posts>
    </div>
    
    <div class="pagination-info">
      <p>Zobrazujeme články z kategorie <strong>Vývoj</strong>. <a href="/blog">Zpět na všechny články</a></p>
    </div>
  </div>
</div>
